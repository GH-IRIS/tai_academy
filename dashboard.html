<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="TAI Platform Student Dashboard Clone - Pixel-close replica.">
    <title>Dashboard | TAI Platform</title>
    <!-- Google Fonts & Material Symbols -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-base: #11121a;
            --bg-sidebar: #090a10;
            --bg-card: #181926;
            --border-color: #24263b;
            --text-primary: #ffffff;
            --text-secondary: #9aa0b9;
            --accent-blue: #0056ff;
            --accent-cyan: #00e1ff;
            --accent-gradient: linear-gradient(135deg, #0056ff 0%, #00e1ff 100%);
            --font-sans: 'Inter', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
            --sidebar-width: 72px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: var(--font-sans);
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* Vertical Left Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 100;
        }

        .sidebar-icons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
            width: 100%;
        }

        .side-btn {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: background-color 0.2s, color 0.2s;
            position: relative;
        }

        .side-btn:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }

        .side-btn.active {
            color: var(--accent-cyan);
            background-color: rgba(0, 225, 255, 0.05);
            border: 1px solid rgba(0, 225, 255, 0.15);
        }

        .side-btn span {
            font-size: 26px;
        }

        .sidebar-bottom {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            width: 100%;
        }

        /* Toggle Mode Switch */
        .mode-toggle {
            width: 44px;
            height: 24px;
            background-color: #24263b;
            border-radius: 20px;
            position: relative;
            cursor: pointer;
        }

        .mode-toggle::after {
            content: '☀️';
            font-size: 10px;
            position: absolute;
            top: 50%;
            left: 4px;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            background-color: #ffffff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: left 0.2s;
        }

        .user-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border-color);
            cursor: pointer;
        }

        /* Main Workspace Content Area */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            height: 100%;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Banner Slider Block */
        .slider-banner {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            position: relative;
            background-color: #0b0c13;
            cursor: pointer;
        }

        .banner-link-img {
            width: 100%;
            display: block;
            object-fit: cover;
            max-height: 280px;
        }

        /* Custom Navigation Arrows on Banner */
        .slider-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            background-color: rgba(0, 0, 0, 0.4);
            border-radius: 50%;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            z-index: 10;
        }

        .arrow-left { left: 16px; }
        .arrow-right { right: 16px; }

        /* Dashboard Grid Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1.2fr;
            gap: 24px;
            align-items: start;
        }

        /* Card blocks */
        .dashboard-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            height: 360px;
        }

        .card-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-title {
            font-family: var(--font-display);
            font-size: 18px;
            font-weight: 700;
        }

        .card-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* 1. Progress Card Details */
        .progress-visual-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .progress-svg {
            transform: rotate(-90deg);
            width: 160px;
            height: 160px;
        }

        .progress-circle-bg {
            fill: none;
            stroke: #24263b;
            stroke-width: 10;
        }

        .progress-circle-val {
            fill: none;
            stroke-width: 10;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s ease;
        }

        .val-outer { stroke: var(--accent-cyan); }
        .val-middle { stroke: var(--accent-blue); }
        .val-inner { stroke: #454763; }

        .progress-center-text {
            position: absolute;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .progress-legend {
            display: flex;
            justify-content: center;
            gap: 16px;
            font-size: 12.5px;
            color: var(--text-secondary);
            margin-top: 16px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .dot-outer { background-color: var(--accent-cyan); }
        .dot-middle { background-color: var(--accent-blue); }
        .dot-inner { background-color: #454763; }

        /* 2. Employability Score Gauge */
        .gauge-visual-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .gauge-svg {
            width: 180px;
            height: 100px;
        }

        .gauge-bg {
            fill: none;
            stroke: #24263b;
            stroke-width: 16;
            stroke-linecap: round;
        }

        .gauge-fill {
            fill: none;
            stroke: var(--accent-blue);
            stroke-width: 16;
            stroke-linecap: round;
            stroke-dasharray: 220;
            stroke-dashoffset: 220; /* Default empty score */
        }

        .gauge-score-value {
            font-size: 38px;
            font-weight: 700;
            margin-top: -15px;
        }

        .gauge-legend-column {
            display: flex;
            flex-direction: column;
            gap: 6px;
            position: absolute;
            right: 10px;
            top: 25px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* 3. Leaderboard Podium */
        .leaderboard-dropdown {
            background-color: #24263b;
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .podium-container {
            flex: 1;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 16px;
            margin-top: 20px;
        }

        .podium-col {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .avatar-podium {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background-color: var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            position: relative;
            margin-bottom: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .podium-block {
            width: 60px;
            background: linear-gradient(180deg, #1f2139 0%, #111221 100%);
            border: 1px solid var(--border-color);
            border-bottom: none;
            border-radius: 6px 6px 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-secondary);
        }

        /* Podium Heights and Specialties */
        .col-1st .avatar-podium {
            background-color: #2e7d32;
            border: 2px solid #ffd600;
        }

        .crown-icon {
            position: absolute;
            top: -18px;
            font-size: 18px;
        }

        .col-1st .podium-block {
            height: 110px;
            background: linear-gradient(180deg, rgba(0, 225, 255, 0.15) 0%, rgba(0, 86, 255, 0.05) 100%);
            border-color: rgba(0, 225, 255, 0.3);
            color: var(--accent-cyan);
        }

        .col-2nd .avatar-podium {
            background-color: #d84315;
            border: 2px solid var(--border-color);
        }

        .col-2nd .podium-block {
            height: 80px;
        }

        .col-3rd .avatar-podium {
            background-color: #37474f;
            border: 2px solid var(--border-color);
        }

        .col-3rd .podium-block {
            height: 60px;
        }

        /* Tool Button styling */
        .tool-btn {
            background: none;
            border: none;
            cursor: pointer;
            outline: none;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: color 0.2s;
        }
        .tool-btn:hover {
            color: var(--text-primary);
        }

        .side-btn i {
            font-size: 20px;
        }

        .leaderboard-dropdown {
            background-color: #24263b;
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-primary);
            cursor: pointer;
            outline: none;
        }

        /* Floating AI Doubt Assistant Widget */
        .ai-chat-widget-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 10000;
        }

        .ai-chat-fab {
            width: 56px;
            height: 56px;
            background: var(--accent-gradient);
            color: #ffffff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(0, 86, 255, 0.4);
            font-size: 24px;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 0;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .ai-chat-fab:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 28px rgba(0, 86, 255, 0.55);
        }

        /* Chat Window */
        .ai-chat-window {
            position: absolute;
            bottom: 72px;
            right: 0;
            width: 350px;
            height: 480px;
            background-color: rgba(24, 25, 38, 0.98);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px) scale(0.95);
            transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s;
        }

        .ai-chat-window.open {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        /* Header */
        .ai-chat-header {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar-status {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            font-size: 16px;
            color: #ffffff;
        }

        .status-dot {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 10px;
            height: 10px;
            background-color: #22c55e;
            border: 2px solid var(--bg-card);
            border-radius: 50%;
        }

        .header-info h4 {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .header-info p {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .ai-chat-header .close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
            transition: color 0.2s;
        }

        .ai-chat-header .close-btn:hover {
            color: var(--text-primary);
        }

        /* Body */
        .ai-chat-body {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-color: rgba(9, 10, 16, 0.4);
        }

        .chat-message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 13.5px;
            line-height: 1.45;
        }

        .chat-message.bot {
            background-color: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .chat-message.user {
            background: var(--accent-gradient);
            color: #ffffff;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        /* typing indicator */
        .typing-indicator {
            align-self: flex-start;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px 14px;
            display: flex;
            gap: 4px;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background-color: var(--text-secondary);
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Footer */
        .ai-chat-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
            background-color: var(--bg-card);
        }

        .ai-chat-footer input {
            flex: 1;
            background-color: rgba(9, 10, 16, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--text-primary);
            font-size: 13.5px;
            outline: none;
            transition: border-color 0.2s;
        }

        .ai-chat-footer input:focus {
            border-color: var(--accent-blue);
        }

        .ai-chat-footer button {
            width: 38px;
            height: 38px;
            background: var(--accent-gradient);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }

        .ai-chat-footer button:hover {
            opacity: 0.9;
        }


        /* Responsive Viewports */
        @media (max-width: 1024px) {
            .dashboard-grid {
                grid-template-columns: 1fr 1fr;
            }
            .dashboard-card.leader-card {
                grid-column: 1 / -1;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none; /* Hide sidebar on mobile */
            }
            .main-content {
                margin-left: 0;
                padding: 16px;
            }
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            .dashboard-card {
                height: auto;
            }
        }
    </style>
</head>
<body>
    <!-- Left Vertical Icon Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-icons">
            <a href="#" class="side-btn" title="Scanner"><i class="fas fa-qrcode"></i></a>
            <a href="#" class="side-btn active" title="Home"><i class="fas fa-home"></i></a>
            <a href="#" class="side-btn" title="Courses"><i class="fas fa-book-open"></i></a>
            <a href="#" class="side-btn" title="Assignments"><i class="fas fa-tasks"></i></a>
            <a href="#" class="side-btn" title="Projects"><i class="fas fa-folder"></i></a>
            <a href="#" class="side-btn" title="Assessments"><i class="fas fa-clipboard-check"></i></a>
            <a href="#" class="side-btn" title="Jobs"><i class="fas fa-briefcase"></i></a>
            <a href="#" class="side-btn" title="Bookmark"><i class="fas fa-bookmark"></i></a>
            <a href="#" class="side-btn" title="Help"><i class="fas fa-question-circle"></i></a>
            <a href="#" class="side-btn" title="AI Assistant"><i class="fas fa-robot"></i></a>
            <a href="#" class="side-btn" title="Profile"><i class="fas fa-user"></i></a>
        </div>
        
        <div class="sidebar-bottom">
            <div class="mode-toggle" title="Toggle Light/Dark Mode"></div>
            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100&auto=format&fit=crop&q=80" alt="Girish" class="user-avatar" id="sidebar-user-avatar">
        </div>
    </aside>

    <!-- Main Workspace Content -->
    <main class="main-content">
        <!-- Top Batch Banner Slider -->
        <div class="slider-banner">
            <img src="assets/banner.png" alt="Starting New Batch Banner" class="banner-link-img">
            <button class="slider-arrow arrow-left"><i class="fas fa-chevron-left"></i></button>
            <button class="slider-arrow arrow-right"><i class="fas fa-chevron-right"></i></button>
        </div>

        <!-- Dashboard Grid of Cards -->
        <div class="dashboard-grid">
            
            <!-- Card 1: Progress Tracker -->
            <div class="dashboard-card">
                <div class="card-header-row">
                    <h3 class="card-title">Progress</h3>
                    <button class="tool-btn" style="color: var(--text-secondary)"><i class="fas fa-ellipsis-v"></i></button>
                </div>
                <div class="progress-visual-wrapper">
                    <!-- Concentric Progress Rings -->
                    <svg class="progress-svg">
                        <!-- Outer Ring (Course: 75%) -->
                        <circle class="progress-circle-bg" cx="80" cy="80" r="70" />
                        <circle class="progress-circle-val val-outer" cx="80" cy="80" r="70" stroke-dasharray="440" stroke-dashoffset="110" />
                        
                        <!-- Middle Ring (Assignment: 50%) -->
                        <circle class="progress-circle-bg" cx="80" cy="80" r="50" />
                        <circle class="progress-circle-val val-middle" cx="80" cy="80" r="50" stroke-dasharray="314" stroke-dashoffset="157" />
                        
                        <!-- Inner Ring (Test: 25%) -->
                        <circle class="progress-circle-bg" cx="80" cy="80" r="30" />
                        <circle class="progress-circle-val val-inner" cx="80" cy="80" r="30" stroke-dasharray="188" stroke-dashoffset="141" />
                    </svg>
                    <span class="progress-center-text">Progress</span>
                </div>
                <div class="progress-legend">
                    <div class="legend-item"><span class="legend-dot dot-outer"></span>Course</div>
                    <div class="legend-item"><span class="legend-dot dot-middle"></span>Assignment</div>
                    <div class="legend-item"><span class="legend-dot dot-inner"></span>Test</div>
                </div>
            </div>

            <!-- Card 2: Employability Score Gauge -->
            <div class="dashboard-card">
                <div class="card-header-row">
                    <h3 class="card-title">Employability Score</h3>
                    <button class="tool-btn" style="color: var(--text-secondary)"><i class="fas fa-ellipsis-v"></i></button>
                </div>
                <div class="gauge-visual-wrapper">
                    <!-- SVG Semicircular Gauge -->
                    <svg class="gauge-svg" viewBox="0 0 200 100">
                        <path class="gauge-bg" d="M20,90 A80,80 0 0,1 180,90" />
                        <path class="gauge-fill" id="gauge-progress-path" d="M20,90 A80,80 0 0,1 180,90" />
                    </svg>
                    <span class="gauge-score-value">0</span>
                    
                    <!-- Gauge Scoring segments -->
                    <div class="gauge-legend-column">
                        <div class="legend-item"><span class="legend-dot" style="background-color: #ef5350;"></span>0 to 35</div>
                        <div class="legend-item"><span class="legend-dot" style="background-color: #ffca28;"></span>36 to 70</div>
                        <div class="legend-item"><span class="legend-dot" style="background-color: #66bb6a;"></span>71 to 100</div>
                    </div>
                </div>
            </div>

            <!-- Card 3: Leaderboard Podium -->
            <div class="dashboard-card leader-card">
                <div class="card-header-row">
                    <div>
                        <h3 class="card-title">Leaderboard</h3>
                        <span class="card-subtitle">Overall Top Performers</span>
                    </div>
                    <div style="display:flex; gap:10px; align-items:center;">
                        <button class="leaderboard-dropdown">Total <i class="fas fa-chevron-down" style="font-size: 11px;"></i></button>
                        <button class="tool-btn" style="color: var(--text-secondary)"><i class="fas fa-share-alt"></i></button>
                    </div>
                </div>
                
                <!-- Performance Podium -->
                <div class="podium-container">
                    <!-- 2nd Place -->
                    <div class="podium-col col-2nd">
                        <div class="avatar-podium" title="Darshan">D</div>
                        <div class="podium-block">2</div>
                    </div>
                    <!-- 1st Place -->

    <!-- Floating AI Doubt Assistant Widget -->

        <!-- Chat Window Popup -->
        <div id="ai-chat-window" class="ai-chat-window">

    <!-- Script for gauge simulation -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Animate Employability Score Gauge to mock value (e.g. 78 out of 100)
            const scoreLabel = document.querySelector(".gauge-score-value");
            const gaugeFill = document.getElementById("gauge-progress-path");
            
            if (scoreLabel && gaugeFill) {
                const targetScore = 78;
                let currentScore = 0;
                
                // Dasharray length for semicircle is ~251
                // 251 * (1 - score / 100)
                setTimeout(() => {
                    const timer = setInterval(() => {
                        currentScore++;
                        scoreLabel.textContent = currentScore;
                        
                        const offset = 220 - (currentScore / 100) * 220;
                        gaugeFill.style.strokeDashoffset = offset;
                        
                        // Change color based on score tier
                        if (currentScore < 35) {
                            gaugeFill.style.stroke = "#ef5350";
                        } else if (currentScore < 70) {
                            gaugeFill.style.stroke = "#ffca28";
                        } else {
                            gaugeFill.style.stroke = "#66bb6a";
                        }

                        if (currentScore >= targetScore) {
                            clearInterval(timer);
                        }
                    }, 20);
                }, 800);
            }
        });

        // Interactive AI Chatbot Widget Logic
        document.addEventListener("DOMContentLoaded", () => {
            const chatToggle = document.getElementById("ai-chat-toggle");
            const chatWindow = document.getElementById("ai-chat-window");
            const chatClose = document.getElementById("ai-chat-close");
            const chatInput = document.getElementById("ai-chat-input");
            const chatSend = document.getElementById("ai-chat-send");
            const chatBody = document.getElementById("ai-chat-body");

            if (!chatToggle || !chatWindow || !chatClose || !chatInput || !chatSend || !chatBody) return;

            chatToggle.addEventListener("click", () => {
                chatWindow.classList.toggle("open");
                if (chatWindow.classList.contains("open")) {
                    chatInput.focus();
                }
            });

            chatClose.addEventListener("click", () => {
                chatWindow.classList.remove("open");
            });

            window.addEventListener("keydown", (e) => {
                if (e.key === "Escape") {
                    chatWindow.classList.remove("open");
                }
            });

            function sendMessage() {
                const text = chatInput.value.trim();
                if (!text) return;

                // Add user message
                appendMessage(text, "user");
                chatInput.value = "";

                // Auto-scroll
                chatBody.scrollTop = chatBody.scrollHeight;

                // Show typing indicator
                showTypingIndicator();

                // Get bot reply
                setTimeout(() => {
                    removeTypingIndicator();
                    const reply = getBotReply(text);
                    appendMessage(reply, "bot");
                    chatBody.scrollTop = chatBody.scrollHeight;
                }, 1200);
            }

            chatSend.addEventListener("click", sendMessage);
            chatInput.addEventListener("keydown", (e) => {
                if (e.key === "Enter") {
                    sendMessage();
                }
            });

            function appendMessage(text, sender) {
                const msgDiv = document.createElement("div");
                msgDiv.className = `chat-message ${sender}`;
                msgDiv.textContent = text;
                chatBody.appendChild(msgDiv);
            }

            let typingElement = null;

            function showTypingIndicator() {
                if (typingElement) return;
                typingElement = document.createElement("div");
                typingElement.className = "typing-indicator";
                typingElement.innerHTML = `
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                `;
                chatBody.appendChild(typingElement);
                chatBody.scrollTop = chatBody.scrollHeight;
            }

            function removeTypingIndicator() {
                if (typingElement) {
                    typingElement.remove();
                    typingElement = null;
                }
            }

            function getBotReply(message) {
                const msg = message.toLowerCase();
                
                if (msg.includes("hello") || msg.includes("hi") || msg.includes("hey")) {
                    return "Hello! How can I help you today? Ask me about our courses, placements, or coding doubts!";
                }
                if (msg.includes("java")) {
                    return "Our Java Full Stack course covers Java basics, DSA, Spring Boot, React, and SQL. It runs for 120 days and includes unlimited placement drives!";
                }
                if (msg.includes("python")) {
                    return "Our Python Full Stack course covers Core & Advanced Python, Django, ReactJS, SQL, and DSA. Great for building web apps and starting a tech career!";
                }
                if (msg.includes("placement") || msg.includes("job") || msg.includes("salary")) {
                    return "Tap Academy provides unlimited placement drives with 400+ partner companies. Graduates land packages ranging from ₹5 LPA to ₹16 LPA!";
                }
                if (msg.includes("fee") || msg.includes("cost") || msg.includes("price")) {
                    return "We offer flexible pricing options and EMI plans. Request a callback from our advisor using the contact form, and they will share all details!";
                }
                if (msg.includes("analytics") || msg.includes("data")) {
                    return "Our Data Analytics course covers Advanced Excel, SQL Databases, Power BI, Python, and Predictive AI modeling. Ideal for aspiring Data Analysts!";
                }
                
                return "That's a great question! I'm here to guide you with any coding doubts or course questions. Feel free to request a callback using our advisor form for detailed enrollment details!";
            }
        });
    </script>
</body>
